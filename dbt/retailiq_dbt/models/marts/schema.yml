version: 2
 
models:
  - name: fct_sales
    description: "Central fact table — all completed sales orders"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Customer who placed the order"
        tests:
          - not_null
      - name: product_id
        description: "Product that was ordered"
        tests:
          - not_null
      - name: total_amount
        description: "Total order value in CAD"
        tests:
          - not_null
 
  - name: dim_customers
    description: "Customer dimension — master + segments combined"
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - unique
          - not_null
 
  - name: dim_products
    description: "Product dimension — clean product catalogue"
    columns:
      - name: product_id
        description: "Unique product identifier"
        tests:
          - unique
          - not_null
 
  - name: dim_stores
    description: "Store dimension — clean store locations"
    columns:
      - name: store_code
        description: "Unique store identifier"
        tests:
          - unique
          - not_null
 
  - name: dim_campaigns
    description: "Campaign dimension — results and spend combined"
    columns:
      - name: campaign_id
        description: "Campaign identifier"
        tests:
          - not_null